{% extends "base.html" %}

{% block titre %}Supprimer emploi du temps{% endblock %}

{% block contenu %}
<section class="zone-confirmation">
    <div class="page-entete">
        <span class="badge">Action irréversible</span>
        <h1>Supprimer l'emploi du temps</h1>
        <p>Confirmez-vous la suppression de l'emploi du temps du {{ emploi_du_temps.semaine }} ?</p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button class="bouton danger" type="submit">Oui, supprimer</button>
            <a class="bouton secondaire" href="{% url 'detail_emploi_du_temps' emploi_du_temps.pk %}">Annuler</a>
        </div>
    </form>
</section>
{% endblock %}
